<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ประกาศ</title>

<style>

:root { --primary: #ff85a2; --secondary: #4a90e2; }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Kanit', sans-serif; margin: 0; background: linear-gradient(135deg, #77a9eb 0%, #e06c8f 100%); background-attachment: fixed; padding: 15px; }
    .container { max-width: 1150px; margin: auto; }

/* 1. ทำให้แถบหัวข้อโปร่งใส */
h1 {
    text-align: center;
    background: transparent;
    color: white;
    padding: 18px;
    margin: 0;
    font-size: 26px;
    letter-spacing: 2px;
}

/* 2. ทำให้แถบเมนูปุ่มกดโปร่งใส */
.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    background: transparent;
}

.menu button{
    padding:10px 18px;
    border:none;
    background:#f08aa7;
    color:white;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
    transition: 0.3s;
}

.menu button:hover {
    background: #ff6f9c;
    transform: translateY(-2px);
}

.page{
    display:none;
    padding:30px;
}

.box{
    max-width:650px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

input,select{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:14px;
    border-radius:10px;
    border:1px solid #ffc2d3;
    background:#fff5f8;
    font-family: 'Kanit', sans-serif;
}

button.action{
    background:#ff6f9c;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight: bold;
}

button.copy{
    margin-top:6px;
    background:#ffb3c8;
    border:none;
    padding:8px 14px;
    border-radius:10px;
    cursor:pointer;
}

.log{
    background:#fff7fb;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    white-space:pre-wrap;
    border:1px solid #ffd0df;
    font-family: 'Kanit', sans-serif;
    font-size: 14px;
    line-height: 1.5;
}

.ruleItem{
    display:flex;
    justify-content:space-between;
    margin-bottom:5px;
    padding: 5px;
    border-bottom: 1px dashed #ffd0df;
}

</style>
</head>

<div id="logPage" class="page">
<div class="box">
<h2>📜 บันทึกประกาศ</h2>
<div id="history"></div>
</div>
</div>

<script type="module">
// --- 1. Firebase Setup ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCy0tdPIEwL7zW1ZGx4OQ6GZbPGgyHRDBE",
    authDomain: "ssme-1f53b.firebaseapp.com",
    projectId: "ssme-1f53b",
    databaseURL: "https://ssme-1f53b-default-rtdb.asia-southeast1.firebasedatabase.app/",
    storageBucket: "ssme-1f53b.firebasestorage.app",
    messagingSenderId: "186913408309",
    appId: "1:186913408309:web:ddedab18ca3c8cd1d4387c",
    measurementId: "G-7ZJJLMG800"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const logRef = ref(db, 'announcement_logs');

// --- 2. Global Variables & UI Functions ---
let rules=[];
let totalFine=0;

window.showPage = function(id){
    document.querySelectorAll(".page").forEach(p=>p.style.display="none");
    document.getElementById(id).style.display="block";
}

window.addRule = function(){
    let value=document.getElementById("ruleSelect").value;
    if(!value)return;
    let data=value.split("|");
    rules.push({
        rule:data[0],
        fine:Number(data[1]),
        reason:data[2]
    });
    updateRules();
}

function updateRules(){
    let box=document.getElementById("ruleList");
    box.innerHTML="";
    totalFine=0;
    rules.forEach((r,i)=>{
        totalFine+=r.fine;
        let div=document.createElement("div");
        div.className="ruleItem";
        div.innerHTML=`ข้อ ${r.rule} (${r.fine.toLocaleString()})
        <button onclick="removeRule(${i})" style="color:red; cursor:pointer;">ลบ</button>`;
        box.appendChild(div);
    });
    document.getElementById("fine").value=totalFine.toLocaleString();
    updateReason();
}

window.removeRule = function(index){
    rules.splice(index,1);
    updateRules();
}

function updateReason(){
    let autoReason = rules.map(r=>r.reason).join(", ");
    let reasonInput=document.getElementById("reason");
    if(reasonInput.value=="" || reasonInput.dataset.auto=="true"){
        reasonInput.value=autoReason;
        reasonInput.dataset.auto="true";
    }
}

function getRuleText(){
    return rules.map(r=>r.rule).join(",");
}

function time(){
    return new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
}

function date(){
    return new Date().toLocaleDateString('th-TH');
}

// --- 3. Firebase Data Handling ---

window.saveHistory = function(text){
    push(logRef, {
        text: text,
        time: time() + " " + date(),
        timestamp: Date.now()
    });
}

onValue(logRef, (snapshot) => {
    const box = document.getElementById("history");
    box.innerHTML = "";
    const data = snapshot.val();
    if(data){
        Object.keys(data).reverse().forEach(key => {
            const item = data[key];
            let div = document.createElement("div");
            div.className = "log";
            div.innerHTML = `
                <div style="color:#ff6f9c; font-weight:bold; margin-bottom:5px;">🕒 ${item.time}</div>
                ${item.text}<br><br>
                <button onclick="deleteLog('${key}')" style="background:#ffd0df; border:none; border-radius:5px; cursor:pointer;">🗑 ลบ</button>
            `;
            box.appendChild(div);
        });
    }
});

window.deleteLog = function(key){
    if(confirm("ยืนยันการลบรายการนี้? ทุกคนจะมองไม่เห็นรายการนี้อีก")){
        remove(ref(db, `announcement_logs/${key}`));
    }
}

// --- 4. Logic Functions ---

window.warn = function(){
    let gang=document.getElementById("gang").value;
    let reason=document.getElementById("reason").value;
    let fine=document.getElementById("fine").value;
    let status=document.getElementById("status").value;
    let level=document.getElementById("warnLevel").value;
    let ruleText=getRuleText();
    let statusText = status=="ชำระแล้ว" ? "+สถานะ : ชำระแล้ว" : "-สถานะ : ยังไม่ชำระ";

    let fivem=`/gov ประกาศตักเตือน แก๊ง ${gang} เนื่องจาก ${reason} เตือนครั้งที่ ${level} รวม ตักเตือน ${level} ครั้ง ขอบคุณค่ะ/ครับ`;
    let discord=`📢 ประกาศตักเตือน\nแก๊ง ${gang}\nเหตุผล : ${reason}\nเตือนครั้งที่ ${level}`;

    if(level==2){
        if(status=="ยังไม่ชำระ"){
            fivem=`/gov ประกาศ Blacklist แก๊ง ${gang} เนื่องจาก ${reason} ขอบคุณครับ/ค่ะ`;
        }else{
            fivem=`/gov ประกาศปลด Blacklist แก๊ง ${gang} เนื่องจาก ชำระแล้ว`;
        }
        discord=`#  ⛔  __ BLACKLIST __ ⛔\n\n\`\`\`diff\nแก๊ง : ${gang}\nหัวข้อ : BLACKLIST ข้อที่ ${ruleText} เนื่องจาก ${reason}\n( เมื่อเวลา ${time()} น. วันที่ ${date()} )\nค่าปรับ : ${fine} TD\n${statusText}\n\`\`\`\n\n<@&1335511632587128954> <@&1364843875105243206>`;
    }
    document.getElementById("warnFiveM").innerText=fivem;
    document.getElementById("warnDiscord").innerText=discord;
    saveHistory(discord);
}

window.cooldown = function(){
    let gang=document.getElementById("coolGang").value;
    let now=new Date();
    let end=new Date(now.getTime()+10*60000);
    let start=now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    let stop=end.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    let text=`ประกาศ รบกวน แก๊ง ${gang} ออกจากพื้นที่โรงพยาบาลภายใน ระยะเวลา 10 นาที เริ่มตั้งแต่เวลา ${start} ถึง ${stop} น. ขอบคุณครับ/ค่ะ`;
    document.getElementById("coolFiveM").innerText="/gov "+text;
    document.getElementById("coolDiscord").innerText=`\`\`\`\n${text}\n\`\`\`\n<@&1335511632587128954> <@&1364843875105243206>`;
    saveHistory(text);
}

window.caseMsg = function(){
    let phone=document.getElementById("casePhone").value;
    let game=`/gov รบกวน เบอร์ ${phone} แพทย์ไม่พบร่างผู้สลบกรุณาติดต่อ หรือ แจ้งจุดสลบ ได้เลยค่ะ/ครับ`;
    let discord=`รบกวน เบอร์ ${phone} แพทย์ไม่พบร่างผู้สลบกรุณาติดต่อ หรือ แจ้งจุดสลบ ได้เลยค่ะ/ครับ\n<@&1335511632587128954><@&1364843875105243206>`;
    document.getElementById("caseGame").innerText=game;
    document.getElementById("caseDiscord").innerText=discord;
    saveHistory(discord);
}

window.copyText = function(id,btn){
    navigator.clipboard.writeText(document.getElementById(id).innerText);
    btn.innerText="คัดลอกแล้ว ✓";
    setTimeout(() => { btn.innerText = "คัดลอก"; }, 2000);
}

showPage("warnPage");

</script>

</body>
</html>
